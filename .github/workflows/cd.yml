name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build and Package Application
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile and Package Application
        run: mvn -f backend/pom.xml -B clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: backend/target/*.war

  publish-docker-and-deploy:
    name: Publish Docker Image and Deploy
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set Short SHA
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "short_sha=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: backend/target/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ds-vendas:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/ds-vendas:sha-${{ steps.vars.outputs.short_sha }}

      - name: Copy Nginx config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "nginx/dsvendas.conf"
          target: "/tmp"
          strip_components: 1

      - name: Remotely Deploy to Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Navigate to isolated workspace
            mkdir -p /home/${{ secrets.SSH_USERNAME }}/dsvendas
            cd /home/${{ secrets.SSH_USERNAME }}/dsvendas
            
            # Re-create the docker-compose configuration
            cat << 'EOF' > docker-compose-homolog.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                container_name: dsvendas-postgres
                ports:
                  - "${POSTGRES_PORT:-8181}:5432"
                environment:
                  POSTGRES_DB: ${POSTGRES_DB:-dsvendas_db}
                  POSTGRES_USER: ${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              app:
                image: ${DOCKER_HUB_USERNAME:-felipeschirmann}/ds-vendas:${IMAGE_TAG:-latest}
                container_name: dsvendas-app
                ports:
                  - "${APP_PORT:-8180}:8080"
                environment:
                  APP_PROFILE: ${APP_PROFILE:-homolog}
                  DSVENDAS_DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dsvendas_db}
                  DSVENDAS_DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
                  DSVENDAS_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
                  DSVENDAS_BACKEND_PORT: 8080
                  DSVENDAS_FRONTEND_URL: ${DSVENDAS_FRONTEND_URL:-http://localhost:3000}
                depends_on:
                  db:
                    condition: service_healthy
            volumes:
              postgres_data:
            EOF
            
            # Update dynamic version tags
            if [ -f .env.homolog ]; then
              sed -i '/^IMAGE_TAG=/d' .env.homolog
              sed -i '/^DOCKER_HUB_USERNAME=/d' .env.homolog
            fi
            echo "IMAGE_TAG=sha-${{ steps.vars.outputs.short_sha }}" >> .env.homolog
            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" >> .env.homolog
            
            # Pull images
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog pull
            
            # Stop and remove containers and volumes (homolog is ephemeral)
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog down -v
            
            # Deploy fresh stack
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog up -d
            
            # Prune unused images and containers (removes the old image version)
            docker image prune -a -f
            
            # Move Nginx config and reload Nginx
            sudo mv /tmp/dsvendas.conf /etc/nginx/conf.d/dsvendas.conf
            sudo nginx -t && sudo nginx -s reload
