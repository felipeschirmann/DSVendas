version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dsvendas-postgres
    ports:
      - "${POSTGRES_PORT:-8181}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsvendas_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_HUB_USERNAME:-felipeschirmann}/ds-vendas:${IMAGE_TAG:-latest}
    container_name: dsvendas-app
    ports:
      - "${APP_PORT:-8180}:8080"
    environment:
      APP_PROFILE: ${APP_PROFILE:-homolog}
      DSVENDAS_DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dsvendas_db}
      DSVENDAS_DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DSVENDAS_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DSVENDAS_BACKEND_PORT: 8080
      DSVENDAS_FRONTEND_URL: ${DSVENDAS_FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
