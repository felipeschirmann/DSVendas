version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dsvendas-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dsvendas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsvendas-app-dev
    ports:
      - "8080:8080"
    environment:
      APP_PROFILE: dev
      DSVENDAS_DATABASE_URL: jdbc:postgresql://db:5432/dsvendas
      DSVENDAS_DATABASE_USERNAME: postgres
      DSVENDAS_DATABASE_PASSWORD: postgres_local_password
      DSVENDAS_BACKEND_PORT: 8080
      DSVENDAS_FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_dev:
