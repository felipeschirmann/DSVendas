# DSVendas - Homologation Profile Properties

# Database configuration
spring.datasource.url=${DSVENDAS_DATABASE_URL}
spring.datasource.username=${DSVENDAS_DATABASE_USERNAME}
spring.datasource.password=${DSVENDAS_DATABASE_PASSWORD}

# Hibernate / JPA configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Port configuration
server.port=${DSVENDAS_BACKEND_PORT:8080}

# Trusted headers strategy for Reverse Proxy (Nginx) over HTTPS
server.forward-headers-strategy=FRAMEWORK

# CORS Settings
cors.allow.frontend=${DSVENDAS_FRONTEND_URL:http://localhost:3000}
